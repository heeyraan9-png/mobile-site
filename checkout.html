<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Checkout</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='cart.html'">←</button>
    <h1>Checkout</h1>
    <span style="width:34px;"></span>
  </div>

  <div class="content">
    <div class="section-title">Data Pengiriman</div>
    <form id="checkoutForm">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="name" required placeholder="Nama penerima" />
      </div>
      <div class="form-group">
        <label>Nomor Telepon</label>
        <input type="tel" id="phone" required placeholder="08xxxxxxxxxx" />
      </div>
      <div class="form-group">
        <label>Alamat Lengkap</label>
        <textarea id="address" required placeholder="Alamat pengiriman"></textarea>
      </div>
    </form>

    <div class="section-title">Ringkasan Pesanan</div>
    <div id="orderSummary"></div>

    <p id="errorMsg" style="color:#dc2626; font-size:13px; display:none;"></p>
  </div>

  <div class="bottom-action">
    <button class="btn btn-primary" id="payBtn">Bayar dengan QRIS</button>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/api.js"></script>
<script>
  function renderSummary() {
    const cart = getCart();
    const box = document.getElementById('orderSummary');
    if (!cart.length) {
      box.innerHTML = '<div class="empty-state">Keranjang kosong, kembali ke toko.</div>';
      document.getElementById('payBtn').disabled = true;
      return;
    }
    box.innerHTML = `
      <div class="summary-box">
        ${cart.map((item) => `
          <div class="summary-row">
            <span>${item.name} x${item.qty}</span>
            <span>${formatRupiah(item.price * item.qty)}</span>
          </div>
        `).join('')}
        <div class="summary-row total">
          <span>Total</span>
          <span>${formatRupiah(cartTotal())}</span>
        </div>
      </div>
    `;
  }
  renderSummary();

  document.getElementById('payBtn').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    if (!name || !phone || !address) {
      errorMsg.textContent = 'Mohon lengkapi semua data pengiriman.';
      errorMsg.style.display = 'block';
      return;
    }

    const cart = getCart();
    if (!cart.length) return;

    const payBtn = document.getElementById('payBtn');
    payBtn.disabled = true;
    payBtn.textContent = 'Memproses...';

    try {
      const { data: order } = await Api.createOrder({
        items: cart.map((item) => ({ productId: item.productId, qty: item.qty })),
        customer: { name, phone, address }
      });
      clearCart();
      window.location.href = `payment.html?orderId=${order.id}`;
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      payBtn.disabled = false;
      payBtn.textContent = 'Bayar dengan QRIS';
    }
  });
</script>
</body>
</html>
